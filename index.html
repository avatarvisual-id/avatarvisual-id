<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio | sofian hadi</title>
    <style>
        /* Gaya Sederhana agar Web Terlihat Profesional */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            border: 2px solid #333;
            padding: 2rem;
            border-radius: 15px;
            background: #252525;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #00ff88; margin-bottom: 0.5rem; }
        p { color: #ccc; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #00ff88;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #00cc6e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Halo, Saya sofian hadi</h1>
        <p>Selamat datang di proyek pertama saya di GitHub.<br>
        Saya seorang pengembang yang fokus pada solusi kreatif dan kode yang bersih.</p>
        
        <a href="mailto:emailmu@gmail.com" class="btn">Hubungi Saya</a>
    </div>

</body>
</html>
